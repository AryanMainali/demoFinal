services:
  redis:
    image: redis:7-alpine
    container_name: kriterion-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kriterion-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kriterion-celery-worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
    command: celery -A app.core.celery_app worker --loglevel=info --queues=default,code_execution,grading --concurrency=1

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kriterion-celery-beat
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
    command: celery -A app.core.celery_app beat --loglevel=info

  sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    container_name: kriterion-sandbox
    restart: "no"
    privileged: false
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - isolated

networks:
  default:
    driver: bridge
  isolated:
    driver: bridge
    internal: true

volumes:
  redis_data:
